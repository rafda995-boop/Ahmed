<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED HUB ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-orange: #ff5a00; --bg: #0f0f0f; --card: #1c1c1c; --rgb: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #161616; padding: 15px; text-align: center; border-bottom: 2px solid var(--main-orange); }
        .logo { font-size: 24px; font-weight: bold; color: var(--main-orange); margin-bottom: 10px; }
        .logo span { color: white; margin-left: 5px; }
        .search-container { position: relative; width: 90%; max-width: 500px; margin: 0 auto 10px; }
        .search-container input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 25px; border: 1px solid #333; background: #252525; color: white; outline: none; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }
        .rgb-line { height: 3px; width: 100%; background: var(--rgb); background-size: 400%; animation: move-rgb 4s linear infinite; }
        @keyframes move-rgb { 0%{background-position:0%} 100%{background-position:100%} }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .anime-card { background: var(--card); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; border-bottom: 3px solid transparent; }
        .anime-card:hover { transform: translateY(-5px); border-bottom-color: var(--main-orange); }
        .anime-card img { width: 100%; height: 200px; object-fit: cover; }
        .anime-card h3 { font-size: 13px; padding: 8px; margin: 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        iframe { width: 95%; max-width: 800px; height: 50%; border: 2px solid var(--main-orange); border-radius: 12px; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 35px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">AHMED HUB <span>ANIME</span> 🎃</div>
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="ابحث عن الأنمي المفضل لديك..." onkeyup="searchAnime()">
    </div>
</header>
<div class="rgb-line"></div>

<div class="container" id="anime-list">
    <p style="text-align: center; width: 100%;">جاري الاتصال بالسيرفرات الاحتياطية...</p>
</div>

<div id="player-modal">
    <span class="close-btn" onclick="closePlayer()">&times;</span>
    <iframe id="main-player" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
    // قائمة سيرفرات متنوعة لضمان العمل
    const apis = [
        'https://api.consumet.org/anime/gogoanime',
        'https://api-consumet-org-three.vercel.app/anime/gogoanime',
        'https://c.delusionz.xyz/anime/gogoanime'
    ];

    async function loadAnime(query = '') {
        const list = document.getElementById('anime-list');
        let success = false;

        for (let api of apis) {
            try {
                const url = query ? `${api}/${query}` : `${api}/recent-episodes`;
                const res = await fetch(url);
                if (!res.ok) continue;
                const data = await res.json();
                render(data.results);
                success = true;
                break; 
            } catch (e) { console.log("سيرفر متوقف، محاولة سيرفر آخر..."); }
        }

        if (!success) list.innerHTML = "<p>تعذر الاتصال بجميع السيرفرات، جرب تحديث الصفحة.</p>";
    }

    function render(data) {
        const list = document.getElementById('anime-list');
        list.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.onclick = () => play(item.id);
            card.innerHTML = `<img src="${item.image}"><h3>${item.title}</h3>`;
            list.appendChild(card);
        });
    }

    let timer;
    function searchAnime() {
        clearTimeout(timer);
        timer = setTimeout(() => {
            const q = document.getElementById('search-input').value;
            if (q.length > 2) loadAnime(q);
            else if (q.length === 0) loadAnime();
        }, 500);
    }

    function play(id) {
        document.getElementById('player-modal').style.display = 'flex';
        // استخدام مشغل يدعم سيرفرات متعددة تلقائياً
        document.getElementById('main-player').src = `https://www.consumet.org/anime/gogoanime/watch/${id}-episode-1`;
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('main-player').src = '';
    }

    loadAnime();
</script>
</body>
</html>
