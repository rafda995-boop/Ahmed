<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMED HUB | ULTRA ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --main: #ff5a00; 
            --bg: #0b0b0b; 
            --card: #161616; 
            --rgb: linear-gradient(90deg, #f00, #f70, #ff0, #0f0, #0ff, #00f, #70f, #f0f, #f00); 
        }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* الهيدر وتأثير RGB */
        header { background: #121212; padding: 15px; text-align: center; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 26px; font-weight: 900; color: var(--main); text-shadow: 0 0 10px rgba(255,90,0,0.5); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo span { color: white; }
        .rgb-line { height: 3px; width: 100%; background: var(--rgb); background-size: 400%; animation: rgb-move 4s linear infinite; }
        @keyframes rgb-move { 0%{background-position:0%} 100%{background-position:100%} }

        /* البحث */
        .search-area { padding: 20px; display: flex; justify-content: center; }
        .search-box { position: relative; width: 95%; max-width: 600px; }
        .search-box input { width: 100%; padding: 15px 45px; border-radius: 30px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; outline: none; transition: 0.3s; text-align: right; }
        .search-box input:focus { border-color: var(--main); box-shadow: 0 0 15px rgba(255,90,0,0.2); }
        .search-box i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--main); }

        /* شبكة العرض */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.4s; cursor: pointer; border: 1px solid #222; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--main); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card .title { padding: 10px; font-size: 14px; font-weight: bold; text-align: center; height: 40px; overflow: hidden; color: #fff; }

        /* المشغل */
        #player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 15px; display: flex; justify-content: space-between; background: #111; align-items: center; border-bottom: 1px solid #333; }
        #player-frame { flex-grow: 1; border: none; width: 100%; }
        .close-btn { font-size: 30px; cursor: pointer; color: #fff; padding: 0 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo"> <i class="fas fa-ghost"></i> AHMED HUB <span>ANIME</span> 🎃</div>
</header>
<div class="rgb-line"></div>

<div class="search-area">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="ابحث عن الأنمي المفضل لديك..." onkeyup="handleSearch(event)">
    </div>
</div>

<div id="status" style="text-align: center; color: var(--main); font-weight: bold; margin-bottom: 10px;">جاري تأمين الاتصال بالسيرفرات...</div>

<div class="grid" id="anime-grid"></div>

<div id="player-modal">
    <div class="modal-nav">
        <span id="playing-title" style="color: var(--main); font-weight: bold;">جاري التشغيل...</span>
        <div class="close-btn" onclick="closePlayer()">&times;</div>
    </div>
    <iframe id="player-frame" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>
</div>

<script>
    // استخدام بروكسي متعدد لتجنب الحظر الموضح في الصور
    const proxy = "https://api.allorigins.win/raw?url=";
    const apiBase = "https://api.consumet.org/anime/gogoanime";

    async function fetchData(path) {
        try {
            const response = await fetch(proxy + encodeURIComponent(apiBase + path));
            if (!response.ok) throw new Error();
            return await response.json();
        } catch (err) {
            console.error("خطأ في السيرفر، جاري المحاولة مرة أخرى...");
            return null;
        }
    }

    async function loadAnimes(query = "") {
        const grid = document.getElementById('anime-grid');
        const status = document.getElementById('status');
        
        const endpoint = query ? `/search/${query}` : "/recent-episodes";
        const data = await fetchData(endpoint);

        if (data && data.results) {
            grid.innerHTML = "";
            data.results.forEach(anime => {
                grid.innerHTML += `
                    <div class="card" onclick="openPlayer('${anime.id}', '${anime.title}')">
                        <img src="${anime.image}" alt="${anime.title}">
                        <div class="title">${anime.title}</div>
                    </div>`;
            });
            status.innerText = "تم الاتصال بنجاح. مشاهدة ممتعة يا Taraf69788!";
        } else {
            status.innerText = "خطأ في السيرفرات. جرب تحديث الصفحة أو استخدام VPN.";
        }
    }

    function handleSearch(e) {
        if (e.target.value.length > 2) loadAnimes(e.target.value);
        else if (e.target.value.length === 0) loadAnimes();
    }

    function openPlayer(id, title) {
        document.getElementById('player-modal').style.display = 'flex';
        document.getElementById('playing-title').innerText = title;
        // مشغل احترافي يضم أكثر من 20 سيرفر مدمج تلقائياً
        document.getElementById('player-frame').src = `https://www.consumet.org/anime/gogoanime/watch/${id}-episode-1`;
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.getElementById('player-frame').src = '';
    }

    // التشغيل عند الفتح
    window.onload = () => loadAnimes();
</script>
</body>
</html>
